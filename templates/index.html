<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR 工具集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0d0f;
      --bg-secondary: #141418;
      --bg-card: #1a1a1f;
      --border: #2a2a30;
      --text-primary: #f0f0f5;
      --text-secondary: #888899;
      --accent: #3dffc3;
      --accent-dim: rgba(61, 255, 195, 0.15);
      --danger: #ff4757;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(61, 255, 195, 0.03) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(100, 100, 255, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: var(--radius);
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 14px 20px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .tab:hover {
      color: var(--text-primary);
      background: var(--bg-card);
    }

    .tab.active {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .tab-icon {
      margin-right: 8px;
    }

    .panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--bg-secondary);
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-zone .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .upload-zone p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .upload-zone .highlight {
      color: var(--accent);
    }

    .preview-area {
      margin-top: 24px;
      display: none;
      position: relative;
    }

    .preview-area.visible { display: block; }

    .preview-img {
      max-width: 100%;
      max-height: 400px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .remove-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .remove-btn:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 20px;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-box {
      margin-top: 32px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .result-header h3 {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .btn-copy, .btn-download {
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-copy:hover, .btn-download:hover {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }

    .result-content {
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-content::-webkit-scrollbar {
      width: 6px;
    }

    .result-content::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    .result-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .loading.visible { display: block; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .error-msg {
      display: none;
      padding: 16px 20px;
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      color: var(--danger);
      margin-top: 16px;
    }

    .error-msg.visible { display: block; }

    /* Screenshot panel */
    .screenshot-area {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
    }

    .screenshot-area .icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .screenshot-area h3 {
      margin-bottom: 12px;
      font-weight: 500;
    }

    .screenshot-area p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .btn-screenshot {
      padding: 14px 32px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-screenshot:hover { opacity: 0.9; }

    /* Responsive */
    @media (max-width: 768px) {
      .tabs { flex-direction: column; }
      .container { padding: 24px 16px; }
      header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>OCR <span>工具集</span></h1>
      <p>文档识别 / 表格提取 / 截图识字</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-panel="document">
        <span class="tab-icon">📄</span>文档识别
      </button>
      <button class="tab" data-panel="table">
        <span class="tab-icon">📊</span>表格提取
      </button>
    </div>

    <!-- 文档识别 -->
    <div id="document" class="panel active">
      <div class="upload-zone" id="doc-upload">
        <input type="file" id="doc-file" accept="image/*,.pdf">
        <div class="icon">📁</div>
        <p>拖拽图片到这里，或 <span class="highlight">点击选择文件</span></p>
        <p style="margin-top:8px;font-size:0.8rem;color:var(--text-secondary)">支持 PNG, JPG, PDF</p>
      </div>
      <div class="preview-area" id="doc-preview">
        <button class="remove-btn" onclick="clearDoc()">×</button>
        <img class="preview-img" id="doc-img" src="" alt="预览">
      </div>
      <button class="btn-primary" id="doc-btn" disabled onclick="runDocOCR()">开始识别</button>
      <div class="loading" id="doc-loading">
        <div class="spinner"></div>
        <p>识别中...</p>
      </div>
      <div class="error-msg" id="doc-error"></div>
      <div class="result-box" id="doc-result" style="display:none">
        <div class="result-header">
          <h3>识别结果</h3>
          <div class="result-actions">
            <button class="btn-copy" onclick="copyText('doc')">复制</button>
            <button class="btn-download" onclick="downloadTxt('doc')">下载 TXT</button>
            <button class="btn-download" onclick="downloadDocx()">下载 Word</button>
          </div>
        </div>
        <div class="result-content" id="doc-text"></div>
      </div>
    </div>

    <!-- 表格提取 -->
    <div id="table" class="panel">
      <div class="upload-zone" id="table-upload">
        <input type="file" id="table-file" accept="image/*">
        <div class="icon">📊</div>
        <p>拖拽表格图片到这里，或 <span class="highlight">点击选择文件</span></p>
        <p style="margin-top:8px;font-size:0.8rem;color:var(--text-secondary)">支持 PNG, JPG</p>
      </div>
      <div class="preview-area" id="table-preview">
        <button class="remove-btn" onclick="clearTable()">×</button>
        <img class="preview-img" id="table-img" src="" alt="预览">
      </div>
      <button class="btn-primary" id="table-btn" disabled onclick="runTableOCR()">提取表格</button>
      <div class="loading" id="table-loading">
        <div class="spinner"></div>
        <p>提取中...</p>
      </div>
      <div class="error-msg" id="table-error"></div>
      <div class="result-box" id="table-result" style="display:none">
        <div class="result-header">
          <h3>提取结果</h3>
          <div class="result-actions">
            <button class="btn-download" onclick="downloadExcel()">下载 Excel</button>
          </div>
        </div>
        <div class="result-content" id="table-info" style="color:var(--text-secondary)"></div>
      </div>
    </div>

  </div>

  <script>
    // State
    let currentDocText = '';
    let currentDocxPath = '';
    let currentTablePath = '';

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
      });
    });

    // File input handlers
    document.getElementById('doc-file').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) previewDoc(file);
    });

    document.getElementById('table-file').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) previewTable(file);
    });

    // Drag and drop
    ['doc-upload', 'table-upload'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
      el.addEventListener('dragleave', () => el.classList.remove('dragover'));
      el.addEventListener('drop', e => {
        e.preventDefault();
        el.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (id === 'doc-upload') previewDoc(file);
        else previewTable(file);
      });
    });

    function previewDoc(file) {
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('doc-img').src = e.target.result;
        document.getElementById('doc-preview').classList.add('visible');
        document.getElementById('doc-btn').disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function previewTable(file) {
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('table-img').src = e.target.result;
        document.getElementById('table-preview').classList.add('visible');
        document.getElementById('table-btn').disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function clearDoc() {
      document.getElementById('doc-file').value = '';
      document.getElementById('doc-preview').classList.remove('visible');
      document.getElementById('doc-btn').disabled = true;
      document.getElementById('doc-result').style.display = 'none';
    }

    function clearTable() {
      document.getElementById('table-file').value = '';
      document.getElementById('table-preview').classList.remove('visible');
      document.getElementById('table-btn').disabled = true;
      document.getElementById('table-result').style.display = 'none';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 5000);
    }

    function hideError(id) {
      document.getElementById(id).classList.remove('visible');
    }

    async function runDocOCR() {
      const fileInput = document.getElementById('doc-file');
      const file = fileInput.files[0];
      if (!file) return;

      document.getElementById('doc-loading').classList.add('visible');
      document.getElementById('doc-btn').disabled = true;
      document.getElementById('doc-result').style.display = 'none';
      hideError('doc-error');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const resp = await fetch('/api/document-ocr', { method: 'POST', body: formData });
        const data = await resp.json();

        if (data.success) {
          currentDocText = data.text;
          currentDocxPath = data.docx_path || '';
          document.getElementById('doc-text').textContent = data.text;
          document.getElementById('doc-result').style.display = 'block';
        } else {
          showError('doc-error', data.error || '识别失败');
        }
      } catch (e) {
        showError('doc-error', '网络错误，请检查服务是否启动');
      }

      document.getElementById('doc-loading').classList.remove('visible');
      document.getElementById('doc-btn').disabled = false;
    }

    async function runTableOCR() {
      const fileInput = document.getElementById('table-file');
      const file = fileInput.files[0];
      if (!file) return;

      document.getElementById('table-loading').classList.add('visible');
      document.getElementById('table-btn').disabled = true;
      document.getElementById('table-result').style.display = 'none';
      hideError('table-error');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const resp = await fetch('/api/table-ocr', { method: 'POST', body: formData });
        const data = await resp.json();

        if (data.success) {
          currentTablePath = data.output_path;
          document.getElementById('table-info').textContent = `表格已提取完成，共 ${data.rows} 行数据`;
          document.getElementById('table-result').style.display = 'block';
        } else {
          showError('table-error', data.error || '提取失败');
        }
      } catch (e) {
        showError('table-error', '网络错误，请检查服务是否启动');
      }

      document.getElementById('table-loading').classList.remove('visible');
      document.getElementById('table-btn').disabled = false;
    }


    function copyText(type) {
      const text = currentDocText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(`#doc-result .btn-copy`);
        btn.textContent = '已复制!';
        setTimeout(() => btn.textContent = '复制', 2000);
      });
    }

    function downloadTxt(type) {
      const text = currentDocText;
      const blob = new Blob([text], { encoding: 'UTF-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ocr_result.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadDocx() {
      window.location.href = '/' + currentDocxPath;
    }

    function downloadExcel() {
      window.location.href = '/' + currentTablePath;
    }
  </script>
</body>
</html>
